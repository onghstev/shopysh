# Nginx config for Shopysh
# Handles SSL termination and reverse proxy to Next.js app

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name www.shopysh.com shopysh.com;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl;
    http2 on;
    server_name www.shopysh.com shopysh.com;

    # Use Docker internal DNS resolver for runtime resolution
    resolver 127.0.0.11 valid=30s;

    # SSL certificates (managed by certbot)
    # Check: ls /etc/letsencrypt/live/ to see if dir is shopysh.com or www.shopysh.com
    ssl_certificate /etc/letsencrypt/live/shopysh.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shopysh.com/privkey.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # File upload size limit
    client_max_body_size 50M;

    # Proxy to Next.js app — use variable to force runtime DNS resolution
    set $app_upstream http://app:3000;

    location / {
        proxy_pass $app_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    # Static assets caching
    location /_next/static/ {
        proxy_pass $app_upstream;
        proxy_cache_valid 60m;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
